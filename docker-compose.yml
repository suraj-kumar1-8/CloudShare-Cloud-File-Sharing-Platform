version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: cloudshare_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: cloud_file_sharing
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - cloudshare_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudshare_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      # Use the container service name as the hostname
      MONGO_URI: mongodb://root:rootpassword@mongo:27017/cloud_file_sharing?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      CLIENT_URL: http://localhost:80
    ports:
      - "5001:5001"
    networks:
      - cloudshare_net

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: cloudshare_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - cloudshare_net

volumes:
  mongo_data:

networks:
  cloudshare_net:
    driver: bridge
